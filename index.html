<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMT-1 現場防錯助手</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #4285f4; --danger: #ea4335; --success: #34a853; --text: #ffffff; }
        body { font-family: Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        .btn { width: 100%; padding: 35px 20px; margin: 15px 0; border: none; border-radius: 20px; font-size: 1.8em; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--primary); }
        .btn-red { background: var(--danger); }
        .btn-green { background: var(--success); }
        .btn-small { padding: 15px; font-size: 1.1em; background: #555; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 8px solid var(--primary); }
        .step-text { font-size: 1.3em; margin: 15px 0; line-height: 1.5; }
        select { width: 100%; padding: 15px; font-size: 1.2em; background: #333; color: white; border-radius: 10px; margin: 10px 0; border: 1px solid #555; }
        .score-box { font-size: 2.5em; text-align: center; color: #fbbc05; margin: 20px 0; font-weight: bold; }
        .warn { color: var(--danger); text-align: center; font-size: 1.4em; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1 style="text-align: center; margin-bottom: 30px;">🚑 接觸傷病患</h1>
        <button class="btn btn-blue" onclick="show('p-conscious')">👤 有意識</button>
        <button class="btn btn-red" onclick="show('p-unconscious')">🚫 無意識 (U)</button>
    </div>

    <div id="p-unconscious" class="page">
        <h2 style="color:var(--danger)">🚨 無意識判定流程</h2>
        <div class="card">
            <div class="step-text">1. <b>測量脈搏/呼吸</b> (<10秒)</div>
            <div class="step-text">2. <b>無脈搏：</b> 立即 CPR + AED</div>
            <div class="step-text">3. <b>有脈搏：</b> 維持呼吸道 (OPA/NPA)</div>
        </div>
        <button class="btn btn-green" onclick="show('p-gcs')">下一步：計算 GCS</button>
        <button class="btn btn-small" onclick="location.reload()">回首頁</button>
    </div>

    <div id="p-conscious" class="page">
        <h2>✅ 有意識評估 (ABC)</h2>
        <div class="card">
            <div class="step-text"><b>A:</b> 呼吸道暢通/無異物</div>
            <div class="step-text"><b>B:</b> 呼吸頻率/深度正常</div>
            <div class="step-text"><b>C:</b> 摸橈動脈/觀察膚色濕冷</div>
        </div>
        <button class="btn btn-green" onclick="show('p-gcs')">下一步：計算 GCS</button>
        <button class="btn btn-small" onclick="location.reload()">回首頁</button>
    </div>

    <div id="p-gcs" class="page">
        <h2>📊 GCS 指數評估</h2>
        <div class="card" style="border-left-color: #fbbc05;">
            <label>張眼反應 (E)</label>
            <select id="e" onchange="calc()">
                <option value="4">4 - 自動張眼</option>
                <option value="3">3 - 呼喚張眼</option>
                <option value="2">2 - 痛刺激張眼</option>
                <option value="1">1 - 無反應</option>
            </select>
            <label>語言反應 (V)</label>
            <select id="v" onchange="calc()">
                <option value="5">5 - 回答正確</option>
                <option value="4">4 - 回答錯誤</option>
                <option value="3">3 - 只能說單詞</option>
                <option value="2">2 - 只能發聲音</option>
                <option value="1">1 - 無反應</option>
            </select>
            <label>運動反應 (M)</label>
            <select id="m" onchange="calc()">
                <option value="6">6 - 聽從指示</option>
                <option value="5">5 - 定位痛刺激</option>
                <option value="4">4 - 正常屈曲</option>
                <option value="3">3 - 病態屈曲</option>
                <option value="2">2 - 伸張(僵直)</option>
                <option value="1">1 - 無反應</option>
            </select>
        </div>
        <div class="score-box">總分：<span id="total">15</span></div>
        <div id="warn" class="warn"></div>
        <button class="btn btn-blue" onclick="location.reload()">完成並重置</button>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        function calc() {
            let total = parseInt(document.getElementById('e').value) + 
                        parseInt(document.getElementById('v').value) + 
                        parseInt(document.getElementById('m').value);
            document.getElementById('total').innerText = total;
            document.getElementById('warn').innerText = (total < 14) ? "⚠️ 危急個案！儘速送醫" : "";
        }
    </script>
</body>
</html>
